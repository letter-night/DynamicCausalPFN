# @package _global_
dataset:
  _target_: src.data.PretrainMIMICDatasetCollection   # Pretraining on synthetic MIMIC-style data
  name: mimic_pretrain
  seed: ${exp.seed}
  num_patients:
    train: 100
    val: 100
  max_seq_length: 30                                    # Max length of time series
  val_batch_size: 512                                   # Batch size for evaluation
  treatment_mode: multilabel                            # multilabel (MIMIC uses multilabel)
  num_pretrain_datasets_train: 1000                     # Number of synthetic datasets (tasks) for training
  num_pretrain_dataset_val: 100                         # Number of synthetic datasets (tasks) for validation
  projection_horizon: 2                                 # Range of tau-step-ahead prediction (tau = projection_horizon + 1)
  treatment_sequence: [[1.],
                       [1.],
                       [1.]]

model:
  dim_treatments: 1
  dim_vitals: 3
  dim_static_features: 1
  dim_outcomes: 1

exp:
  unscale_rmse: False
  percentage_rmse: False
