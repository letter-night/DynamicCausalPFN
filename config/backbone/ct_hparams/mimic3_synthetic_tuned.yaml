# @package _global_
# Tuned on mimic3_synthetic (2026-03-22)
dataset:
  max_number: 3000

model:
  multi:
    optimizer:
      learning_rate: 0.01
    batch_size: 32
    seq_hidden_units: 6
    br_size: 6
    fc_hidden_units: 3
    dropout_rate: 0.1
    num_layer: 2
    num_heads: 3

    self_positional_encoding:
      max_relative_position: 15

exp:
  weights_ema: True
  alpha: 0.01
  beta: 0.99
  balancing: domain_confusion
  max_epochs: 100
