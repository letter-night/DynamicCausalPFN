# @package _global_
# Pretraining HPs from GMM-NLL tuning (v3 Trial 00016, rank 1: val_rmse_all=38.65)
# Note: seq_hidden_units and br_size are multipliers of input_size (=2 for cancer_sim_pretrain)
# Note: fc_hidden_units is a multiplier of computed br_size
# Actual computed values: seq_hidden=256, br=64, fc=256
model:
  dynamic_causal_pfn:
    optimizer:
      learning_rate: 0.0001
    batch_size: 256
    num_layer: 6
    seq_hidden_units: 128
    br_size: 32
    fc_hidden_units: 4
    dropout_rate: 0.1
    num_heads: 8
    gmm_n_components: 5

exp:
  max_epochs: 100
