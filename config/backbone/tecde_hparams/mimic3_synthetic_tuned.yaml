# @package _global_
# Tuned on mimic3_synthetic (2026-03-22)
dataset:
  max_number: 3000

model:
  encoder:
    optimizer:
      learning_rate: 0.001
    batch_size: 128
    seq_hidden_units: 12
    br_size: 6
    fc_hidden_units: 3
    dropout_rate: 0.1
    num_layer: 1

  train_decoder: True
  decoder:
    optimizer:
      learning_rate: 0.0001
    batch_size: 1024
    seq_hidden_units: 6
    br_size: 12
    fc_hidden_units: 12
    dropout_rate: 0.2
    num_layer: 1

exp:
  weights_ema: False
  balancing: grad_reverse
  max_epochs: 100
