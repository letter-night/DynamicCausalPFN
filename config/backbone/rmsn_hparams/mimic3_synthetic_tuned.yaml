# @package _global_
# Tuned on mimic3_synthetic (2026-03-22)
dataset:
  max_number: 3000

model:
  propensity_treatment:
    seq_hidden_units: 12
    dropout_rate: 0.1
    num_layer: 2
    batch_size: 256
    max_grad_norm: 2.0
    optimizer:
      learning_rate: 0.01

  propensity_history:
    seq_hidden_units: 12
    dropout_rate: 0.1
    num_layer: 2
    batch_size: 64
    max_grad_norm: 0.5
    optimizer:
      learning_rate: 0.01

  encoder:
    seq_hidden_units: 6
    dropout_rate: 0.1
    num_layer: 1
    batch_size: 64
    max_grad_norm: 0.5
    optimizer:
      learning_rate: 0.01

  train_decoder: True
  decoder:
    seq_hidden_units: 24
    dropout_rate: 0.2
    num_layer: 1
    batch_size: 512
    max_grad_norm: 0.5
    optimizer:
      learning_rate: 0.001

exp:
  max_epochs: 100
